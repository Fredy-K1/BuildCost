<div class="min-h-screen bg-slate-100 p-6">

  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-800">Mi perfil</h1>
      <p class="text-slate-500">Administra tu información personal.</p>
    </div>
    <button type="button" (click)="cerrarSesion()"
      class="bg-red-600 hover:bg-red-700 text-white px-5 py-3 rounded-xl font-semibold">Cerrar sesión</button>
  </div>

  <div *ngIf="errorMsg()" class="mb-5 bg-red-100 border border-red-300 text-red-700 rounded-xl p-4">{{ errorMsg() }}
  </div>
  <div *ngIf="successMsg()" class="mb-5 bg-green-100 border border-green-300 text-green-700 rounded-xl p-4">{{
    successMsg() }}</div>
  <div *ngIf="loading()" class="text-center py-16 text-slate-600">Cargando perfil...</div>
  <div *ngIf="!loading() && perfil() as usuario" class="grid lg:grid-cols-3 gap-8">

    <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
      <div
        class="w-28 h-28 rounded-full bg-orange-500 text-white flex items-center justify-center text-4xl font-bold mx-auto">
        {{ iniciales() }}</div>
      <h2 class="text-2xl font-bold mt-6">{{ nombreCompleto() }}</h2>
      <span class="inline-block mt-3 bg-blue-100 text-blue-700 px-4 py-1 rounded-full">{{ usuario.role }}</span>
      <p class="mt-6 text-slate-600">{{ usuario.email }}</p>
    </div>

    <div class="lg:col-span-2 bg-white rounded-2xl shadow-lg p-8">
      <form #perfilForm="ngForm" (ngSubmit)="guardarPerfil()">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-2xl font-bold text-slate-700">Información personal</h2>
          <button *ngIf="!editando()" type="button" (click)="activarEdicion()"
            class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-lg">
            Editar perfil
          </button>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block mb-2 font-medium">
              Nombre(s)
            </label>
            <input name="profileName" [(ngModel)]="formulario.name" [disabled]="!editando() || saving()"
              class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500">
          </div>

          <div>
            <label class="block mb-2 font-medium">
              Apellido paterno
            </label>
            <input name="profileApaterno" [(ngModel)]="formulario.apaterno" [disabled]="!editando() || saving()"
              class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500">
          </div>

          <div>
            <label class="block mb-2 font-medium">Apellido materno</label>
            <input name="profileAmaterno" [(ngModel)]="formulario.amaterno" [disabled]="!editando() || saving()"
              class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500">
          </div>

          <div>
            <label class="block mb-2 font-medium">Teléfono</label>
            <input name="profileTelefono" [(ngModel)]="formulario.telefono" [disabled]="!editando() || saving()"
              class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <hr class="my-8">
        <h2 class="text-2xl font-bold text-slate-700 mb-6">Información de la cuenta</h2>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block mb-2 font-medium">Correo electrónico</label>
            <input [value]="usuario.email" disabled class="w-full border rounded-xl px-4 py-3 bg-slate-100">
          </div>

          <div>
            <label class="block mb-2 font-medium">Tipo de usuario</label>
            <input [value]="usuario.role" disabled class="w-full border rounded-xl px-4 py-3 bg-slate-100">
          </div>
        </div>
        <div *ngIf="editando()" class="flex justify-end gap-4 mt-10">
          <button type="button" (click)="cancelarEdicion()" class="px-6 py-3 rounded-xl border">Cancelar</button>
          <button type="submit" [disabled]="saving() || perfilForm.invalid"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl">
            {{ saving() ? 'Guardando...' : 'Guardar cambios' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
