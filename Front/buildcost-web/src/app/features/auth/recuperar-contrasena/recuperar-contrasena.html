<div *ngIf="successMsg" class="fixed top-5 right-5 z-50 flex items-center w-full max-w-xs p-4 mb-4 text-gray-500 bg-white rounded-lg shadow border-l-4 border-green-500" role="alert">
    <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg">
        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
        </svg>
    </div>
    <div class="ms-3 text-sm font-normal">{{ successMsg }}</div>
</div>

<div class="min-h-screen flex items-center justify-center bg-stone-200 px-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
            <img src="/assets/img/edificio.png" alt="building" class="w-16 h-16 mx-auto mb-3">
            <h1 class="text-2xl font-bold text-gray-800">Recuperar Contraseña</h1>
            <p class="text-gray-500 mt-2">Ingresa tu correo y nueva contraseña</p>
        </div>

        <form (ngSubmit)="recuperar()" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" [(ngModel)]="datos.email" name="email" placeholder="tu@correo.com" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nueva Contraseña</label>
                <input type="password" [(ngModel)]="datos.nuevaContrasena" name="nuevaContrasena" placeholder="********" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div *ngIf="errorMsg" class="flex items-center p-4 text-sm text-red-800 border border-red-300 rounded-lg bg-red-50" role="alert">
                <svg class="flex-shrink-0 w-4 h-4 me-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                </svg>
                <div>
                    <span class="font-medium">¡Error!</span> {{ errorMsg }}
                </div>
            </div>

            <button type="submit" [disabled]="loading" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400">
                {{ loading ? 'Guardando...' : 'Guardar' }}
            </button>
        </form>

        <div class="text-center mt-6">
            <a routerLink="/login" class="text-sm text-blue-600 font-semibold hover:underline">
                ← Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
