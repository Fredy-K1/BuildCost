<div class="min-h-screen flex items-center justify-center bg-stone-200 px-4">
    <div class="bg-slate-200 w-full max-w-md rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
            <img src="/src/assets/img/pico.png" alt="pickaxe"class="w-16 h-16 mx-auto mb-3">

        <span class="text-3xl font-bold text-orange-500">BuildCost</span>
            <h1 class="text-2xl font-bold text-gray-800 mt-4">Presupuestos de Albañilería</h1>
            <p class="text-gray-500 mt-2">Controla costos, materiales y obras</p>
        </div>
    <form (ngSubmit)="login()" onsubmit="return false;"class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
            <input type="email"[(ngModel)]="credenciales.email"name="email"placeholder="tu@correo.com"required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input type="password"[(ngModel)]="credenciales.password"name="password"placeholder="********"required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="text-right">
            <a routerLink="/recuperar-contrasena"class="text-sm text-blue-600 hover:text-blue-800">¿Olvidaste tu contraseña?</a>
        </div>

        <p *ngIf="errorMsg"class="text-red-600 text-sm bg-red-50 p-3 rounded-lg">{{ errorMsg }}</p>
        <button type="submit"[disabled]="loading" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:bg-gray-400">
        {{ loading ? 'Iniciando...' : 'Iniciar Sesión' }}
        </button>
        <div class="text-center pt-4">
            <a routerLink="/registro"class="text-sm text-gray-600 hover:text-blue-600">
                ¿No tienes una cuenta?
            </a>
        </div>
    </form>
</div>
</div>
